<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="N1速算">
<meta name="mobile-web-app-capable" content="yes">
<title>737 N1速算</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{--bg:#f2f2f7;--bg2:#fff;--card:#fff;--card2:#e5e5ea;--sep:#c6c6c8;--nb-bg:rgba(242,242,247,0.92);--acc:#0a84ff;--grn:#34c759;--yel:#ff9500;--org:#ff6b00;--red:#ff3b30;--t1:#000;--t2:#3c3c43;--t3:#6e6e73;--t4:#c7c7cc;--mono:'SF Mono','Menlo',monospace;--drum-bg:#fff;--drum-fade:rgba(255,255,255,1);--drum-fade0:rgba(255,255,255,0);--sbox-bg:rgba(0,0,0,0.04);}
@media(prefers-color-scheme:dark){:root{--bg:#0d0d0f;--bg2:#1c1c1e;--card:#2c2c2e;--card2:#3a3a3c;--sep:#38383a;--nb-bg:rgba(13,13,15,0.92);--acc:#0a84ff;--grn:#30d158;--yel:#ffd60a;--org:#ff9f0a;--red:#ff453a;--t1:#fff;--t2:rgba(235,235,245,0.8);--t3:rgba(235,235,245,0.55);--t4:rgba(235,235,245,0.25);--drum-bg:#1c1c1e;--drum-fade:rgba(28,28,30,1);--drum-fade0:rgba(28,28,30,0);--sbox-bg:rgba(255,255,255,0.05);}}
html,body{min-height:100%;background:var(--bg);color:var(--t1);font-family:-apple-system,'Helvetica Neue',sans-serif;overflow-x:hidden;}
.page{display:none;min-height:100vh;padding-bottom:50px;}.page.on{display:block;}
.nb{position:sticky;top:0;z-index:100;background:var(--nb-bg);backdrop-filter:blur(20px);border-bottom:.5px solid var(--sep);padding:env(safe-area-inset-top,0) 0 0;}
.nb-in{display:flex;align-items:center;justify-content:space-between;height:44px;padding:0 16px;}
.nb-back{color:var(--acc);font-size:17px;background:none;border:none;display:flex;align-items:center;gap:2px;min-width:60px;}
.nb-title{font-size:17px;font-weight:600;color:var(--t1);}
.sec{margin:28px 16px 0;}.sec-hd{font-size:13px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;padding:0 4px 8px;}
.grp{background:var(--card);border-radius:12px;overflow:hidden;box-shadow:0 1px 0 var(--sep);}
.row{display:flex;align-items:center;min-height:50px;padding:0 16px;border-bottom:.5px solid var(--sep);user-select:none;}
.row:last-child{border-bottom:none;}.row:active:not(.notap){background:var(--card2);}
.rl{font-size:17px;color:var(--t1);flex:1;}.rv{font-size:17px;color:var(--t3);font-family:var(--mono);}.rv.hi{color:var(--acc);}
.act-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:20px 16px 0;}
.act{background:var(--card);border-radius:14px;padding:16px 8px 14px;text-align:center;border:2px solid transparent;transition:all .15s;}
.act.sel{border-color:var(--acc);background:rgba(10,132,255,.1);}.act-ic{font-size:26px;margin-bottom:6px;}
.act-nm{font-size:13px;font-weight:600;color:var(--t1);}.act-sub{font-size:11px;color:var(--t3);font-family:var(--mono);}
.seg{background:rgba(118,118,128,.18);border-radius:9px;display:flex;padding:2px;margin:0 16px;}
.sbtn{flex:1;height:32px;border-radius:7px;border:none;background:transparent;color:var(--t3);font-size:15px;}
.sbtn.on{background:var(--bg2);color:var(--t1);box-shadow:0 1px 3px rgba(0,0,0,.15);}
.tog{position:relative;width:51px;height:31px;}.tog input{opacity:0;position:absolute;}
.tog-tr{position:absolute;inset:0;background:var(--sep);border-radius:31px;transition:background .3s;}
.tog input:checked+.tog-tr{background:var(--grn)!important;}
.tog-th{position:absolute;top:2px;left:2px;width:27px;height:27px;border-radius:50%;background:#fff;box-shadow:0 2px 6px rgba(0,0,0,.25);transition:left .28s;}
.tog input:checked~.tog-th{left:22px;}
.cta-w{padding:24px 16px 0;}
.cta{width:100%;height:56px;background:#007AFF;border:none;border-radius:14px;color:#fff;font-size:17px;font-weight:600;}
.cta:active{opacity:.8;}
.qnh-in{width:100%;background:transparent;border:none;color:var(--t1);font-size:22px;font-family:var(--mono);text-align:center;padding:12px 16px;outline:none;}
.ov{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.45);backdrop-filter:blur(4px);display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .28s;}
.ov.open{opacity:1;pointer-events:all;}
.psh{width:100%;background:var(--drum-bg);border-radius:14px 14px 0 0;transform:translateY(100%);transition:transform .35s;}
.ov.open .psh{transform:translateY(0);}
.phd{display:flex;justify-content:space-between;align-items:center;padding:12px 16px 8px;border-bottom:.5px solid var(--sep);}
.ptitle{font-size:13px;color:var(--t3);}.pdone{font-size:17px;color:var(--acc);background:none;border:none;}
.drum{position:relative;height:220px;overflow:hidden;}.d-top,.d-bot{position:absolute;left:0;right:0;z-index:2;height:88px;pointer-events:none;}
.d-top{top:0;background:linear-gradient(to bottom,var(--drum-fade),var(--drum-fade0));}
.d-bot{bottom:0;background:linear-gradient(to top,var(--drum-fade),var(--drum-fade0));}
.d-sel{position:absolute;left:16px;right:16px;top:50%;transform:translateY(-50%);height:44px;border-top:.5px solid var(--sep);border-bottom:.5px solid var(--sep);pointer-events:none;}
.d-list{list-style:none;}.d-item{height:44px;display:flex;align-items:center;justify-content:center;font-size:21px;font-family:var(--mono);color:var(--t3);}
.hero{margin:24px 16px 0;background:linear-gradient(135deg,rgba(10,132,255,.12),rgba(10,132,255,.04));border:1px solid rgba(10,132,255,.3);border-radius:20px;padding:28px 20px 24px;text-align:center;}
.hero-lbl{font-size:12px;color:var(--t3);letter-spacing:1px;}.hero-n1{font-size:80px;font-weight:200;color:var(--acc);font-family:var(--mono);}
.hero-range{font-size:14px;color:var(--t3);margin-top:8px;}.hero-sub{font-size:12px;color:var(--t4);margin-top:8px;}
.bk-hd{font-size:13px;color:var(--t3);margin:28px 16px 0;}.bk-row{display:flex;justify-content:space-between;align-items:center;padding:11px 16px;border-bottom:.5px solid var(--sep);font-size:15px;}
.bk-row.tot{background:rgba(10,132,255,.07);border-top:.5px solid rgba(10,132,255,.2);}
.bk-k{color:var(--t2);flex:1;}.bk-v{font-family:var(--mono);}.bk-v.pos{color:var(--org);}.bk-v.neg{color:var(--grn);}.bk-v.bas{color:var(--yel);}.bk-v.fin{color:var(--acc);font-size:17px;font-weight:600;}
.sbox{margin:14px 16px 0;border-radius:12px;padding:14px 16px;font-size:14px;line-height:1.65;}
.sbox.tw{background:rgba(255,149,0,.1);border:1px solid rgba(255,149,0,.3);color:var(--org);}
.sbox.hw{background:rgba(52,199,89,.08);border:1px solid rgba(52,199,89,.25);color:var(--grn);}
.sbox.nw{background:var(--sbox-bg);border:1px solid var(--sep);color:var(--t2);}
.tip{margin:14px 16px 0;background:rgba(255,149,0,.07);border:1px solid rgba(255,149,0,.2);border-radius:12px;padding:14px 16px;font-size:14px;color:var(--t2);}
.sp{height:40px;}
</style>
</head>
<body>
<div class="page on" id="pg-in">
  <div class="nb"><div class="nb-in"><div class="nb-title">737 基准 N1</div></div></div>
  <div class="sec"><div class="sec-hd">机型</div><div class="act-grid">
    <div class="act sel" data-ac="800W" onclick="selAC(this)"><div class="act-ic">✈</div><div class="act-nm">800W</div><div class="act-sub">7B24</div></div>
    <div class="act" data-ac="800W_SFP" onclick="selAC(this)"><div class="act-ic">✈</div><div class="act-nm">800W SFP</div><div class="act-sub">7B26</div></div>
    <div class="act" data-ac="8MAX" onclick="selAC(this)"><div class="act-ic">✈</div><div class="act-nm">MAX</div><div class="act-sub">LEAP25</div></div>
  </div></div>
  <div class="sec"><div class="sec-hd">落地形态</div><div class="seg">
    <button class="sbtn on" onclick="selFlap(30,this)">襟翼30</button>
    <button class="sbtn" onclick="selFlap(40,this)">襟翼40</button>
  </div></div>
  <div class="sec"><div class="sec-hd">参数</div><div class="grp">
    <div class="row" onclick="openD('weight')"><span class="rl">落地重量</span><span class="rv hi" id="dw">140 klb</span></div>
    <div class="row" onclick="openD('elev')"><span class="rl">机场标高</span><span class="rv hi" id="de">0 ft</span></div>
    <div class="row" onclick="openD('oat')"><span class="rl">地面温度</span><span class="rv hi" id="dt">15 °C</span></div>
    <div class="row" onclick="openD('wind')"><span class="rl">五边风</span><span class="rv hi" id="dwin">静风</span></div>
  </div></div>
  <div class="sec"><div class="sec-hd">修正海压QNH</div><div class="grp">
    <input class="qnh-in" type="number" id="qnh" value="1013" min="950" max="1050">
  </div></div>
  <div class="sec"><div class="sec-hd">附加修正</div><div class="grp">
    <div class="row notap"><span class="rl">防冰使用中</span><label class="tog"><input type="checkbox" id="t-ai"><div class="tog-tr"></div><div class="tog-th"></div></label></div>
    <div class="row notap"><span class="rl">中到大雨/雪</span><label class="tog"><input type="checkbox" id="t-rn"><div class="tog-tr"></div><div class="tog-th"></div></label></div>
  </div></div>
  <div class="sec"><div class="sec-hd">下滑角</div><div class="grp">
    <div class="row" onclick="cycleGS()"><span class="rl">下滑角</span><span class="rv hi" id="dgs">3.0°（标准）</span></div>
  </div></div>
  <div class="cta-w"><button class="cta" onclick="calc()">计算基准N1</button></div>
</div>
<div class="page" id="pg-res">
  <div class="nb"><div class="nb-in"><button class="nb-back" onclick="goBack()">‹ 返回</button><div class="nb-title">基准N1</div></div></div>
  <div class="hero"><div class="hero-lbl">BASELINE N1</div><div class="hero-n1" id="rn1">--%</div><div class="hero-range" id="rrange">-- ~ --%</div><div class="hero-sub" id="rsub"></div></div>
  <div id="shear-wrap"></div><div class="bk-hd">计算步骤</div><div class="grp" id="bk"></div><div class="tip" id="tip"></div>
</div>
<div class="ov" id="ov"><div class="psh"><div class="phd"><span id="ptitle"></span><button onclick="closeD()">完成</button></div><div class="drum"><div class="d-top"></div><div class="d-sel"></div><div class="d-bot"></div><ul id="dlist"></ul></div></div></div>
<script>
const QRH={'800W':{w:[80,100,120,140,160,180],e0:{30:[45.5,50.2,54.4,58.1,61.4,64.4],40:[49.9,55.2,59.8,64.0,67.4,70.4]},e1k:{30:[46.2,50.9,55.1,58.9,62.2,65.1],40:[50.6,55.9,60.6,64.8,68.1,71.2]}},'800W_SFP':{w:[80,100,120,140,160,180],e0:{30:[45.3,50.0,54.2,57.9,61.1,64.1],40:[49.6,54.9,59.5,63.7,66.9,70.0]},e1k:{30:[45.9,50.6,54.9,58.6,61.8,64.9],40:[50.4,55.6,60.3,64.5,67.7,70.8]}},'8MAX':{w:[90,110,130,150,170,190],e0:{30:[41.4,45.3,49.0,52.3,55.0,57.8],40:[46.0,50.4,54.4,58.0,61.4,65.0]},e1k:{30:[41.9,46.0,49.6,52.9,55.7,58.5],40:[46.6,51.0,55.0,58.8,62.1,65.8]}}};
const S={ac:'800W',flap:30,weight:140,elev:0,oat:15,wind:0,gs:3.0};
function selAC(e){document.querySelectorAll('.act').forEach(t=>t.classList.remove('sel'));e.classList.add('sel');S.ac=e.dataset.ac;}
function selFlap(v,e){S.flap=v;document.querySelectorAll('.sbtn').forEach(b=>b.classList.remove('on'));e.classList.add('on');}
const GS=[{v:3.0,l:'3.0°（标准）'},{v:3.25,l:'3.2°～3.3°'},{v:3.5,l:'3.5°'}];let gsI=0;
function cycleGS(){gsI=(gsI+1)%3;S.gs=GS[gsI].v;document.getElementById('dgs').textContent=GS[gsI].l;}
function rng(a,b,s){let r=[];for(let v=a;v<=b;v+=s)r.push(v);return r;}
const DEFS={weight:{title:'落地重量',items:rng(100,155,5),disp:v=>v+'klb',set:v=>{S.weight=v;document.getElementById('dw').textContent=v+'klb';}},elev:{title:'机场标高',items:rng(0,8000,500),disp:v=>v+'ft',set:v=>{S.elev=v;document.getElementById('de').textContent=v+'ft';}},oat:{title:'地面温度',items:rng(-10,40,5),disp:v=>v+'°C',set:v=>{S.oat=v;document.getElementById('dt').textContent=v+'°C';}},wind:{title:'五边风',items:rng(-10,50,5),disp:v=>v===0?'静风':v>0?'顶风+'+v:'顺风'+v,set:v=>{S.wind=v;document.getElementById('dwin').textContent=v===0?'静风':v>0?'顶风+'+v:'顺风'+v;}}};
let curKey=null;function openD(k){curKey=k;const p=DEFS[k];document.getElementById('ptitle').textContent=p.title;const l=document.getElementById('dlist');l.innerHTML='';p.items.forEach(v=>l.innerHTML+=`<li class="d-item">${p.disp(v)}</li>`);document.getElementById('ov').classList.add('open');}
function closeD(){const p=DEFS[curKey];p.set(p.items[0]);document.getElementById('ov').classList.remove('open');curKey=null;}
function calc(){const{ac,flap,weight,elev,oat,wind,gs}=S;const qnh=+document.getElementById('qnh').value;const ai=document.getElementById('t-ai').checked,rn=document.getElementById('t-rn').checked;const n0=QRH[ac].e0[flap][2];let fin=n0+(elev/1000)+(oat-15)/10-(qnh-1013)/10+wind/10+(ai?1:0)+(rn?1:0);fin=Math.round(fin*2)/2;document.getElementById('rn1').textContent=fin+'%';document.getElementById('rrange').textContent=(fin-3)+'~'+(fin+3)+'%';document.getElementById('pg-in').classList.remove('on');document.getElementById('pg-res').classList.add('on');}
function goBack(){document.getElementById('pg-res').classList.remove('on');document.getElementById('pg-in').classList.add('on');}
</script>
</body>
</html>
